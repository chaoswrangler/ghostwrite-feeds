name: Aggregate Feeds

on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:
  push:
    paths:
      - "feeds.yaml"

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run aggregator
        run: python aggregate.py

      - name: Commit updated feed.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.json
          git diff --staged --quiet || git commit -m "Update feed.json [skip ci]"
          git push
